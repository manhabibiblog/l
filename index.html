<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Short URL Generator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:400px;
    background:#111827;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.4);
}

h1{
    margin-bottom:20px;
    font-size:28px;
}

.result{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    font-size:32px;
    margin-bottom:20px;
    letter-spacing:3px;
    word-break:break-all;
}

button{
    background:#3b82f6;
    border:none;
    color:white;
    padding:14px 25px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    background:#2563eb;
}

.info{
    margin-top:20px;
    font-size:14px;
    color:#94a3b8;
}
</style>
</head>
<body>

<div class="container">

    <h1>Short URL Generator</h1>

    <div class="result" id="result">
        /------
    </div>

    <button onclick="generateURL()">
        Generate URL
    </button>

    <div class="info">
        6 Character Unique Generator
    </div>

</div>

<script>
const usedCodes = new Set();

function createCode(length = 6) {

    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';

    let code = '';

    for(let i = 0; i < length; i++) {

        const randomIndex = Math.floor(
            Math.random() * chars.length
        );

        code += chars[randomIndex];
    }

    return code;
}

function generateURL() {

    let shortCode;

    do {
        shortCode = createCode();
    } while(usedCodes.has(shortCode));

    usedCodes.add(shortCode);

    document.getElementById('result').innerText =
        '/' + shortCode;
}
</script>

</body>
</html>
